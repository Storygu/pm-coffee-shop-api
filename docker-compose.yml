services:
  postgres:
    image: postgres:15-alpine
    container_name: pm-coffee-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee_shop_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest:latest
    container_name: pm-coffee-shop-postgrest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - '3001:3000'
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/coffee_shop_db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: supersecretjwtsecret
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
      PGRST_DB_POOL: 10
      PGRST_OPENAPI_MODE: follow-privileges
    volumes:
      - ./postgrest.conf:/etc/postgrest.conf
    command: ["postgrest", "/etc/postgrest.conf"]

volumes:
  postgres_data:
